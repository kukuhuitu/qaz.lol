<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qaz.lol</title>
    <style>
        :root {
            --bg-color: #000;
            --card-bg: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            overflow: hidden;
        }

        .liquid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            filter: blur(80px);
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            opacity: 0.7;
            animation: move 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }

        .blob-1 { background: #007AFF; top: -10%; left: -10%; }
        .blob-2 { background: #FF2D55; bottom: -10%; right: -10%; animation-delay: -5s; }
        .blob-3 { background: #5856D6; top: 40%; left: 20%; animation-delay: -10s; width: 400px; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(200px, 100px) scale(1.2); }
        }

        .glass-container {
            position: relative;
            z-index: 1;
        }

        .glass-card {
            position: relative;
            width: 360px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            
            border-radius: 50px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            
            text-align: center;
            color: white;
            overflow: hidden;
        }

        .glass-card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: rotate(30deg);
            pointer-events: none;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: #fff;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        p {
            font-size: 15px;
            opacity: 0.7;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .tag-group {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-primary {
            display: block;
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 14px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="glass-container" id="container">
        <div class="glass-card">
            <div class="avatar"><img src="http://q1.qlogo.cn/g?b=qq&nk=2658543883&s=100" alt="Avatar"></div>
            <h1>qaz</h1>
            <p></p>
            
            <div class="tag-group">
                <span class="tag">SG</span>
            </div>

            <a href="https://wpa.qq.com/msgrd?v=3&uin=QQ_NUMBER&site=2658543883&menu=yes" class="btn-primary">QQ</a>
        </div>
    </div>

    <script>
        const card = document.getElementById('container');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 25;
            let y = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
